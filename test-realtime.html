<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时更新测试</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5;}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
button{padding:10px 20px;margin:5px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;}
.btn-primary{background:#667eea;color:#fff;}
.btn-success{background:#22c55e;color:#fff;}
.btn-warning{background:#f59e0b;color:#fff;}
#status{background:#e0f2fe;padding:10px;border-radius:8px;margin:10px 0;font-size:14px;}
#price{font-size:24px;font-weight:bold;color:#ef5350;}
#log{background:#1e1e1e;color:#0f0;padding:10px;border-radius:8px;font-family:monospace;font-size:12px;max-height:200px;overflow-y:auto;margin-top:10px;}
</style>
</head>
<body>

<div class="card">
  <h2>🧪 实时更新测试</h2>
  <div id="status">状态：等待加载数据...</div>
  <div style="margin:15px 0;">
    <div style="font-size:14px;color:#666;">最新价格：</div>
    <div id="price">--</div>
  </div>
  <button class="btn-primary" onclick="loadData()">📊 加载数据</button>
  <button class="btn-success" onclick="startUpdate()">▶️ 开始更新</button>
  <button class="btn-warning" onclick="stopUpdate()">⏸️ 停止更新</button>
  <button class="btn-primary" onclick="testOnce()">🧪 测试一次</button>
</div>

<div class="card">
  <h3>📋 调试日志</h3>
  <div id="log"></div>
</div>

<script>
let data = [];
let updateInterval = null;
let updateCount = 0;

// 日志函数
function log(msg) {
  const logEl = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  logEl.innerHTML += `[${time}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
  console.log(msg);
}

// 加载数据
function loadData() {
  log('📊 加载数据中...');
  data = [];
  let price = 10.0;
  for (let i = 0; i < 100; i++) {
    const o = price;
    const c = o + (Math.random() - 0.5) * 0.5;
    const h = Math.max(o, c) + Math.random() * 0.3;
    const l = Math.min(o, c) - Math.random() * 0.3;
    data.push({ open: o, high: h, low: l, close: c });
    price = c;
  }
  updateCount = 0;
  document.getElementById('status').innerHTML = '✅ 数据已加载！共 ' + data.length + ' 个数据点';
  document.getElementById('price').textContent = data[data.length - 1].close.toFixed(2);
  log('✅ 数据加载完成：' + data.length + ' 个数据点');
}

// 更新一次
function updateOnce() {
  if (data.length === 0) {
    log('❌ 无数据，请先加载数据！');
    return false;
  }
  
  const last = data[data.length - 1];
  const change = (Math.random() - 0.5) * 0.1;
  const newPrice = last.close + change;
  
  // 更新数据
  data[data.length - 1] = {
    open: last.open,
    high: Math.max(last.high, newPrice),
    low: Math.min(last.low, newPrice),
    close: newPrice
  };
  
  updateCount++;
  
  // 更新显示
  document.getElementById('price').textContent = newPrice.toFixed(2);
  document.getElementById('status').innerHTML = 
    `✅ 实时更新中...（已更新 ${updateCount} 次）<br>最新价格：<b>${newPrice.toFixed(2)}</b>`;
  
  log(`🔄 第 ${updateCount} 次更新：价格 ${newPrice.toFixed(2)} (${change >= 0 ? '+' : ''}${change.toFixed(3)})`);
  
  return true;
}

// 测试一次
function testOnce() {
  log('🧪 手动测试更新...');
  if (data.length === 0) {
    alert('请先点击"加载数据"！');
    return;
  }
  updateOnce();
}

// 开始自动更新
function startUpdate() {
  if (data.length === 0) {
    alert('请先点击"加载数据"！');
    return;
  }
  
  if (updateInterval) {
    log('⚠️ 已在更新中...');
    return;
  }
  
  log('▶️ 开始实时更新（每3秒）...');
  updateInterval = setInterval(() => {
    updateOnce();
  }, 3000);
  document.getElementById('status').innerHTML = '✅ 实时更新中...（每3秒）';
}

// 停止更新
function stopUpdate() {
  if (updateInterval) {
    clearInterval(updateInterval);
    updateInterval = null;
    log('⏸️ 已停止更新');
    document.getElementById('status').innerHTML = '⏸️ 已停止更新';
  } else {
    log('⚠️ 没有正在运行的更新');
  }
}

// 页面加载时自动加载数据
window.onload = function() {
  log('🚀 页面加载完成');
  loadData();
};
</script>
</body>
</html>
