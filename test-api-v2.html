<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>测试 Lightweight Charts API v2</title>
  <script src="https://unpkg.com/lightweight-charts@5.0.6/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    #chart { width: 100%; height: 300px; border: 1px solid #ccc; background: #fff; }
    .log { background: #000; color: #0f0; padding: 10px; margin-top: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; max-height: 500px; overflow-y: auto; }
    .success { color: #0f0; }
    .error { color: #f00; }
    .info { color: #ff0; }
  </style>
</head>
<body>
  <h1>Lightweight Charts v5.0.6 API 测试 v2</h1>
  <div id="chart"></div>
  <div class="log" id="log"></div>

  <script>
    const logEl = document.getElementById('log');
    
    function addLog(msg, type = 'info') {
      const div = document.createElement('div');
      if (type === 'error') div.className = 'error';
      else if (type === 'success') div.className = 'success';
      else div.className = 'info';
      div.textContent = msg;
      logEl.appendChild(div);
      console.log(msg);
    }

    // 先打印 LightweightCharts 对象有哪些属性
    addLog('=== LightweightCharts 导出的属性 ===');
    for (const key in LightweightCharts) {
      const val = LightweightCharts[key];
      const type = typeof val;
      if (type === 'function' && key.includes('Series')) {
        addLog(`  ${key}: function (构造函数)`);
        // 检查构造函数的属性
        addLog(`    .type = ${val.type}`);
        addLog(`    .wg = ${val.wg}`);
        addLog(`    .isBuiltIn = ${val.isBuiltIn}`);
      } else if (type === 'function') {
        addLog(`  ${key}: function`);
      } else if (key !== 'Z') {
        addLog(`  ${key}: ${type} = ${String(val).slice(0, 60)}`);
      }
    }

    // 尝试创建图表
    try {
      const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        width: 800,
        height: 300,
      });
      addLog('✅ Chart 创建成功');

      // 测试 LightweightCharts.CandlestickSeries
      try {
        const c = chart.addSeries(LightweightCharts.CandlestickSeries, {
          upColor: '#ef5350', downColor: '#26a69a'
        });
        addLog('✅ addSeries(CandlestickSeries) 成功');
        
        c.setData([
          { time: '2024-01-01', open: 100, high: 110, low: 95, close: 105 },
          { time: '2024-01-02', open: 105, high: 115, low: 100, close: 110 },
        ]);
        addLog('✅ Candlestick 数据设置成功');
      } catch(e) {
        addLog(`❌ addSeries(CandlestickSeries) 失败: ${e.message}`, 'error');
      }

      // 测试 LightweightCharts.LineSeries
      try {
        const l = chart.addSeries(LightweightCharts.LineSeries, {
          color: '#2962FF', lineWidth: 2
        });
        addLog('✅ addSeries(LineSeries) 成功');
        
        l.setData([
          { time: '2024-01-01', value: 100 },
          { time: '2024-01-02', value: 110 },
        ]);
        addLog('✅ Line 数据设置成功');
      } catch(e) {
        addLog(`❌ addSeries(LineSeries) 失败: ${e.message}`, 'error');
      }

      // 测试 LightweightCharts.HistogramSeries
      try {
        const h = chart.addSeries(LightweightCharts.HistogramSeries, {
          priceFormat: { type: 'volume' }
        });
        addLog('✅ addSeries(HistogramSeries) 成功');
      } catch(e) {
        addLog(`❌ addSeries(HistogramSeries) 失败: ${e.message}`, 'error');
      }

      // 测试 LightweightCharts.AreaSeries
      try {
        const a = chart.addSeries(LightweightCharts.AreaSeries, {
          color: '#2962FF', lineColor: '#2962FF', topColor: 'rgba(41,98,255,0.3)', bottomColor: 'rgba(41,98,255,0.05)'
        });
        addLog('✅ addSeries(AreaSeries) 成功');
      } catch(e) {
        addLog(`❌ addSeries(AreaSeries) 失败: ${e.message}`, 'error');
      }

    } catch(e) {
      addLog(`❌ 创建 Chart 失败: ${e.message}`, 'error');
    }
  </script>
</body>
</html>
