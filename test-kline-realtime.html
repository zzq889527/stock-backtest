<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K线图实时更新 - 最小测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;padding:20px;background:#f5f5f5;}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
button{padding:10px 20px;margin:5px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;}
.btn-primary{background:#667eea;color:#fff;}
.btn-success{background:#22c55e;color:#fff;}
.btn-warning{background:#f59e0b;color:#fff;}
#chart-wrap{width:100%;height:400px;border:2px solid #e0e0e0;border-radius:12px;position:relative;}
#log{background:#1e1e1e;color:#0f0;padding:10px;border-radius:8px;font-family:monospace;font-size:12px;max-height:150px;overflow-y:auto;margin-top:10px;}
#price{font-size:20px;font-weight:bold;color:#ef5350;}
</style>
</head>
<body>

<div class="card">
  <h2>📈 K线图实时更新测试</h2>
  <div style="margin:15px 0;">
    <button class="btn-primary" onclick="loadData()">📊 加载数据</button>
    <button class="btn-success" onclick="startUpdate()">▶️ 开始更新</button>
    <button class="btn-warning" onclick="stopUpdate()">⏸️ 停止更新</button>
    <button class="btn-primary" onclick="testOnce()">🧪 测试一次</button>
  </div>
  <div>最新价格：<span id="price">--</span></div>
</div>

<div class="card">
  <div id="chart-wrap">
    <canvas id="kline-canvas"></canvas>
  </div>
</div>

<div class="card">
  <h3>📋 调试日志</h3>
  <div id="log"></div>
</div>

<script>
let chart = null;
let updateInterval = null;
let updateCount = 0;

// 日志函数
function log(msg) {
  const logEl = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  logEl.innerHTML += `[${time}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
  console.log(msg);
}

// ========== K线图类 ==========
class KLineChart {
  constructor(canvasId) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.data = [];
    this.resize();
    window.addEventListener('resize', () => this.resize());
    log('✅ KLineChart 初始化完成');
  }
  
  resize() {
    const wrap = document.getElementById('chart-wrap');
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = wrap.clientWidth * dpr;
    this.canvas.height = wrap.clientHeight * dpr;
    this.canvas.style.width = wrap.clientWidth + 'px';
    this.canvas.style.height = wrap.clientHeight + 'px';
    this.dpr = dpr;
    this.render();
    log(`📐 调整尺寸：W=${this.canvas.width}, H=${this.canvas.height}, dpr=${dpr}`);
  }
  
  setData(data) { 
    this.data = data; 
    log(`📊 设置数据：${data.length} 个数据点`);
    this.render(); 
  }
  
  render() {
    if (!this.data.length) {
      log('⚠️ 无数据，跳过渲染');
      return;
    }
    
    const ctx = this.ctx;
    const dpr = this.dpr || 1;
    const W = this.canvas.width;
    const H = this.canvas.height;
    
    log(`🎨 开始渲染：W=${W}, H=${H}, 数据点数=${this.data.length}`);
    
    const padL = 60 * dpr;
    const padR = 20 * dpr;
    const padT = 20 * dpr;
    const padB = 30 * dpr;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const volH = chartH * 0.2;
    const priceH = chartH - volH;
    
    ctx.clearRect(0, 0, W, H);
    
    // 计算价格范围
    let minP = Infinity, maxP = -Infinity;
    for (const d of this.data) {
      if (d.low < minP) minP = d.low;
      if (d.high > maxP) maxP = d.high;
    }
    minP = minP * 0.99;
    maxP = maxP * 1.01;
    
    const barW = chartW / this.data.length;
    
    // 绘制网格
    ctx.strokeStyle = '#f0f0f0';
    ctx.lineWidth = 1;
    ctx.fillStyle = '#999';
    ctx.font = (11 * dpr) + 'px sans-serif';
    ctx.textAlign = 'right';
    
    for (let i = 0; i <= 4; i++) {
      const y = padT + (priceH * i / 4);
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(W - padR, y);
      ctx.stroke();
      
      const p = maxP - (maxP - minP) * i / 4;
      ctx.fillText(p.toFixed(2), padL - 4 * dpr, y + 4 * dpr);
    }
    
    // 绘制K线和成交量
    const maxVol = Math.max(...this.data.map(d => d.volume));
    
    for (let i = 0; i < this.data.length; i++) {
      const d = this.data[i];
      const x = padL + (i + 0.5) * barW;
      const isUp = d.close >= d.open;
      const color = isUp ? '#ef5350' : '#26a69a';
      
      ctx.strokeStyle = color;
      
      // 上下影线
      const yHigh = padT + (maxP - d.high) / (maxP - minP) * priceH;
      const yLow = padT + (maxP - d.low) / (maxP - minP) * priceH;
      ctx.beginPath();
      ctx.moveTo(x, yHigh);
      ctx.lineTo(x, yLow);
      ctx.stroke();
      
      // K线实体
      const yOpen = padT + (maxP - d.open) / (maxP - minP) * priceH;
      const yClose = padT + (maxP - d.close) / (maxP - minP) * priceH;
      const bodyTop = Math.min(yOpen, yClose);
      const bodyH = Math.max(2 * dpr, Math.abs(yOpen - yClose));
      
      ctx.fillStyle = color;
      ctx.fillRect(x - barW * 0.4, bodyTop, barW * 0.8, bodyH);
      
      // 成交量（只绘制最后50个，提高性能）
      if (i >= this.data.length - 50) {
        const volY = padT + priceH + (d.volume / maxVol) * volH;
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.3;
        ctx.fillRect(x - barW * 0.4, volY, barW * 0.8, padT + chartH - volY);
        ctx.globalAlpha = 1.0;
      }
    }
    
    log(`✅ 渲染完成：最后价格=${this.data[this.data.length-1].close.toFixed(2)}`);
  }
}

// ========== 数据生成 ==========
function generateData(days=100) {
  const data = [];
  let price = 10.0;
  for (let i=0; i<days; i++) {
    const o = price;
    const c = o + (Math.random()-0.48)*0.5;
    const h = Math.max(o,c) + Math.random()*0.3;
    const l = Math.min(o,c) - Math.random()*0.3;
    const v = Math.floor(Math.random()*5000000+1000000);
    data.push({time:'2026-05-03',open:o,high:h,low:l,close:c,volume:v});
    price = c;
  }
  return data;
}

// ========== 加载数据 ==========
function loadData() {
  log('📊 加载数据中...');
  const kdata = generateData(100);
  chart = new KLineChart('kline-canvas');
  chart.setData(kdata);
  
  // 更新价格显示
  const last = kdata[kdata.length-1];
  document.getElementById('price').textContent = last.close.toFixed(2);
  log(`✅ 数据加载完成：最后价格=${last.close.toFixed(2)}`);
}

// ========== 更新一次 ==========
function updateOnce() {
  if (!chart || !chart.data || chart.data.length === 0) {
    log('❌ 无数据，请先加载数据！');
    return false;
  }
  
  const lastIndex = chart.data.length - 1;
  const last = chart.data[lastIndex];
  
  // 生成新的价格（小幅波动）
  const change = (Math.random() - 0.5) * 0.1;
  const newPrice = last.close + change;
  const newHigh = Math.max(last.high, newPrice) + Math.random() * 0.05;
  const newLow = Math.min(last.low, newPrice) - Math.random() * 0.05;
  const newVolume = last.volume + Math.floor(Math.random() * 100000);
  
  // 更新最后一个数据点
  chart.data[lastIndex] = {
    time: last.time,
    open: last.open,
    high: newHigh,
    low: newLow,
    close: newPrice,
    volume: newVolume
  };
  
  updateCount++;
  
  // 重新渲染图表
  chart.render();
  
  // 更新价格显示
  document.getElementById('price').textContent = newPrice.toFixed(2);
  
  log(`🔄 第 ${updateCount} 次更新：价格 ${newPrice.toFixed(2)} (${change >= 0 ? '+' : ''}${change.toFixed(3)})`);
  
  return true;
}

// ========== 测试一次 ==========
function testOnce() {
  log('🧪 手动测试更新...');
  if (!chart || !chart.data || chart.data.length === 0) {
    alert('请先点击"加载数据"！');
    return;
  }
  updateOnce();
}

// ========== 开始自动更新 ==========
function startUpdate() {
  if (!chart || !chart.data || chart.data.length === 0) {
    alert('请先点击"加载数据"！');
    return;
  }
  
  if (updateInterval) {
    log('⚠️ 已在更新中...');
    return;
  }
  
  log('▶️ 开始实时更新（每3秒）...');
  updateInterval = setInterval(updateOnce, 3000);
}

// ========== 停止更新 ==========
function stopUpdate() {
  if (updateInterval) {
    clearInterval(updateInterval);
    updateInterval = null;
    log('⏸️ 已停止更新');
  } else {
    log('⚠️ 没有正在运行的更新');
  }
}

// 页面加载时自动加载数据
window.onload = function() {
  log('🚀 页面加载完成');
  loadData();
};
</script>
</body>
</html>
